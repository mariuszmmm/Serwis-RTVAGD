name: Update googleData.json (data branch only)

on:
  schedule:
    - cron: "0 */12 * * *" # co 12 godzin
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-googleData:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kodu z data
        uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 0

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Ustaw zmienne środowiskowe
        run: |
          echo "NEXT_PUBLIC_GOOGLE_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_API_KEY }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_PLACE_ID=${{ secrets.NEXT_PUBLIC_PLACE_ID }}" >> $GITHUB_ENV

      - name: Uruchom update-googleData.js (do /tmp)
        run: |
          mkdir -p /tmp
          node public/scripts/update_googleData.js /tmp/googleData.json

      - name: Porównaj googleData.json bez update_time
        id: compare_googledata
        run: node scripts/compare-googleData.js /tmp/googleData.json public/googleData.json
        continue-on-error: true

      # 8. Commit i push tylko jeśli są inne zmiany niż update_time
      - name: Przełącz na branch data
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          git checkout data

      - name: Utwórz katalog public
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          mkdir -p public

      - name: Skopiuj googleData.json z /tmp do public
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          cp /tmp/googleData.json public/googleData.json

      - name: Debug – pokaż googleData.json na branchu data
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          echo 'Zawartość public/googleData.json na branchu data:'
          cat public/googleData.json

      - name: Debug – git status przed commitem
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          git status

      - name: Debug – git diff przed commitem
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          git diff public/googleData.json

      - name: Commit i push googleData.json
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/googleData.json
          git commit -m "Automatyczna aktualizacja danych: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Brak zmian do commitowania"
          git push origin data
