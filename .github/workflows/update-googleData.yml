name: Update googleData.json

on:
  schedule:
    # - cron: "0 */10 * * *"   # co 10 min
    # - cron: "0 */1 * * *" # co 1 godzin
    - cron: "0 */12 * * *" # co 12 godzin
    # - cron: "0 0 * * *"      # co dziennie o północy
    # - cron: "0 0 1 * *" # raz w miesiącu (pierwszy dzień o północy UTC)

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-googleData:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kodu
      - name: Checkout kodu z main
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      # 2. Ustaw Node.js
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      # 3. Instalacja zależności
      - name: Instaluj zależności (npm install)
        run: npm install

      # 4. Przekazanie Google API Key jako zmiennej ENV
      - name: Ustaw zmienną NEXT_PUBLIC_GOOGLE_API_KEY
        run: |
          echo "NEXT_PUBLIC_GOOGLE_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_API_KEY }}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_PLACE_ID=${{ secrets.NEXT_PUBLIC_PLACE_ID }}" >> $GITHUB_ENV

      # 5. Uruchomienie skryptu Node.js (aktualizacja googleData.json)
      - name: Uruchom update-googleData.js
        run: npm run update-googleData

      - name: Debug – sprawdź czy plik googleData.json istnieje
        run: |
          echo "Pliki w repo:"
          ls -la
          echo "Zawartość googleData.json:"
          cat public/googleData.json || echo "public/googleData.json nie istnieje"

      # 6. Pobierz wersję googleData.json z repozytorium do porównania
      - name: Pobierz wersję googleData.json z repozytorium
        run: |
          cp public/googleData.json public/googleData.repo.json || touch public/googleData.repo.json
          git checkout HEAD -- public/googleData.json || echo '{}' > public/googleData.repo.json

      # 7. Porównaj pliki ignorując update_time
      - name: Porównaj googleData.json bez update_time
        id: compare_googledata
        run: node scripts/compare-googleData.js
        continue-on-error: true

      # 8. Commit i push tylko jeśli są inne zmiany niż update_time
      - name: Skopiuj googleData.json do /tmp
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          cp public/googleData.json /tmp/googleData.json

      - name: Resetuj package-lock.json
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          git restore package-lock.json

      - name: Przełącz na branch data
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          git checkout data

      - name: Utwórz katalog public
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          mkdir -p public

      - name: Skopiuj googleData.json z /tmp do public
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          cp /tmp/googleData.json public/googleData.json

      - name: Debug – pokaż googleData.json na branchu data
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          echo 'Zawartość public/googleData.json na branchu data:'
          cat public/googleData.json

      - name: Debug – git status przed commitem
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          git status

      - name: Debug – git diff przed commitem
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          git diff public/googleData.json

      - name: Commit i push googleData.json
        if: steps.compare_googledata.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/googleData.json
          git commit -m "Automatyczna aktualizacja danych: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "Brak zmian do commitowania"
          git push origin data
